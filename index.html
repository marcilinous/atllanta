<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atllanta — Hiring, matched.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<!-- ============ AUTH SCREEN ============ -->
<div id="auth-screen" class="auth-screen hidden">
  <div class="auth-card">
    <div class="brand-mark">A</div>
    <h1 class="auth-title">Atllanta</h1>
    <p class="auth-sub">Resume-to-JD matching, scheduling and outreach — one login for your whole hiring desk.</p>
    <form id="login-form" class="auth-form">
      <label>Email
        <input type="email" id="login-email" autocomplete="email" required placeholder="you@company.com" />
      </label>
      <label>Password
        <input type="password" id="login-password" autocomplete="current-password" required placeholder="••••••••" />
      </label>
      <button type="submit" class="btn btn-amber btn-block" id="login-btn">Sign in</button>
      <p id="login-error" class="form-error hidden"></p>
    </form>
    <p class="auth-foot">No account yet? Ask your org admin for an invite.</p>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app-shell" class="app hidden">

  <aside class="sidebar">
    <div class="profile-box" id="rail-profile">
      <div class="avatar-ring" id="user-avatar">?</div>
      <div class="profile-name" id="menu-email">—</div>
      <div class="profile-role" id="menu-org">—</div>
      <div class="profile-btns">
        <button class="pbtn" id="settings-btn">Settings</button>
        <button class="pbtn logout" id="logout-btn">Log out</button>
      </div>
    </div>

    <nav class="nav">
      <button class="nav-item active" data-view="jobs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Jobs
      </button>
      <button class="nav-item" data-view="candidates">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Candidates
      </button>
      <button class="nav-item" data-view="interviews">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Interviews
      </button>
      <button class="nav-item" data-view="chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Chat
      </button>
      <button class="nav-item" data-view="rescore">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Re-score
      </button>
      <button class="nav-item" data-view="analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Analytics
      </button>
    </nav>

    <div class="sidebar-foot">
      <div class="credits-pill">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M6 12h12"/></svg>
        <span id="credits-count">—</span> credits
      </div>
      <select id="client-switcher" class="client-select hidden"></select>
    </div>
  </aside>

  <main class="main">
    <div class="page-head">
      <div class="page-title" id="view-title">Jobs</div>
      <div class="page-sub" id="view-sub"></div>
    </div>
    <section id="view-root" class="view-root"></section>
  </main>
</div>

<!-- generic modal -->
<div id="modal-backdrop" class="modal-bg hidden">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 id="modal-title">—</h2>
      <button class="modal-x" id="modal-close" aria-label="Close">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast" class="toast hidden"><span class="dot"></span><span id="toast-msg"></span></div>

<script src="/js/config.js"></script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
