<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atllanta — Business OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563EB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>

<div id="app" class="app hidden">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">A</div>

    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-tooltip">Dashboard</span>
      </button>
      <button class="nav-btn" data-view="employees">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="nav-tooltip">Employees</span>
      </button>
      <button class="nav-btn" data-view="attendance">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="nav-tooltip">Attendance</span>
      </button>
      <button class="nav-btn" data-view="leave">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66L7 18h4l-1 6 4-9h5l-3-4 2-5z"/></svg>
        <span class="nav-tooltip">Leave</span>
      </button>
      <button class="nav-btn" data-view="recruitment">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        <span class="nav-tooltip">Recruitment</span>
      </button>

      <div class="sidebar-nav-bottom">
        <button class="nav-btn" data-view="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span class="nav-tooltip">Settings</span>
        </button>
      </div>
    </nav>
  </aside>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-org" id="topbar-org-name">Atllanta</span>
    </div>
    <div class="topbar-center">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="global-search" placeholder="Search employees, jobs, candidates..." autocomplete="off">
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-icon-btn" id="ai-toggle-btn" title="AI Assistant">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 3 3v2a3 3 0 0 1-3 3h-1v1a4 4 0 0 1-8 0v-1H7a3 3 0 0 1-3-3v-2a3 3 0 0 1 3-3h1V6a4 4 0 0 1 4-4z"/><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/></svg>
      </button>
      <button class="topbar-icon-btn" id="notif-btn" title="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-dot hidden" id="notif-dot"></span>
      </button>
      <div class="dropdown">
        <div class="user-avatar" id="user-avatar" style="background:var(--color-accent)">?</div>
        <div class="user-menu hidden" id="user-menu">
          <div class="user-menu-header">
            <div class="name" id="menu-name">—</div>
            <div class="email" id="menu-email">—</div>
          </div>
          <div class="user-menu-divider"></div>
          <button class="user-menu-item" onclick="location.hash='#/settings'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </button>
          <button class="user-menu-item" id="theme-toggle-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <span id="theme-label">Dark Mode</span>
          </button>
          <div class="user-menu-divider"></div>
          <button class="user-menu-item danger" id="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign out
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="content" id="main-content">
    <div class="empty-state">
      <div class="skeleton skeleton-heading"></div>
      <div class="skeleton skeleton-text" style="width:80%"></div>
      <div class="skeleton skeleton-text" style="width:60%"></div>
    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"><span class="toast-dot"></span><span id="toast-msg"></span></div>

<script>
  const t = localStorage.getItem('atllanta-theme');
  if (t) document.documentElement.setAttribute('data-theme', t);
</script>
<script src="/js/config.js"></script>
<script type="module">
import sb from '/js/supabase.js';
import { checkSession, loadUserProfile, getUser, getOrg, getMembership, logout } from '/js/auth.js';
import { registerRoute, initRouter, navigate } from '/js/router.js';
import { onUnreadChange, fetchUnreadCount, fetchNotifications, markRead, markAllRead } from '/js/notifications.js';
import { initGlobalSearch } from '/js/search.js';
import { initAIPanel, toggleAIPanel } from '/js/ai.js';

import dashboard from '/views/dashboard.js';
import employeeList from '/views/employees/list.js';
import attendanceDashboard from '/views/attendance/dashboard.js';
import leaveApply from '/views/leave/apply.js';
import recruitmentJobs from '/views/recruitment/jobs.js';
import interviewsView from '/views/recruitment/interviews.js';
import settingsOrg from '/views/settings/org.js';
import settingsUsers from '/views/settings/users.js';
import departmentsView from '/views/settings/departments.js';
import integrationsView from '/views/settings/integrations.js';
import employeeProfile from '/views/employees/profile.js';
import employeeImport from '/views/employees/import.js';
import checkinView from '/views/attendance/checkin.js';
import attendanceReport from '/views/attendance/report.js';
import regularizeView from '/views/attendance/regularize.js';
import leaveSettings from '/views/leave/settings.js';
import candidateProfile from '/views/recruitment/candidate-profile.js';
import shortlistView from '/views/recruitment/shortlist.js';
import uploadResumes from '/views/recruitment/upload-resumes.js';
import matcherView from '/views/recruitment/matcher.js';
import aiAssistant from '/views/ai/assistant.js';
import auditLog from '/views/audit/log.js';
import leaveCalendar from '/views/leave/calendar.js';
import leaveBalances from '/views/leave/balances.js';
import leaveApprovals from '/views/leave/approvals.js';
import jobDetail from '/views/recruitment/job-detail.js';

const session = await checkSession();
if (!session) throw new Error('Not authenticated');

const profile = await loadUserProfile();
const org = getOrg();
const user = getUser();

document.getElementById('app').classList.remove('hidden');
document.getElementById('topbar-org-name').textContent = org?.name || 'Atllanta';
document.getElementById('menu-name').textContent = user?.user_metadata?.full_name || user?.email || '—';
document.getElementById('menu-email').textContent = user?.email || '—';

const initials = (user?.user_metadata?.full_name || user?.email || '?').split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
document.getElementById('user-avatar').textContent = initials;

const colors = ['#2563EB', '#16A34A', '#D97706', '#DC2626', '#7C3AED', '#0891B2'];
let hash = 0;
for (const c of (user?.email || '')) hash = (hash * 31 + c.charCodeAt(0)) | 0;
document.getElementById('user-avatar').style.background = colors[Math.abs(hash) % colors.length];

document.getElementById('user-avatar').addEventListener('click', () => {
  document.getElementById('user-menu').classList.toggle('hidden');
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.dropdown')) {
    document.getElementById('user-menu').classList.add('hidden');
  }
});

document.getElementById('logout-btn').addEventListener('click', logout);

// Dark mode
const savedTheme = localStorage.getItem('atllanta-theme');
if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
function updateThemeLabel() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('theme-label').textContent = isDark ? 'Light Mode' : 'Dark Mode';
}
updateThemeLabel();
document.getElementById('theme-toggle-btn').addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('atllanta-theme', next);
  updateThemeLabel();
});

document.querySelectorAll('.nav-btn[data-view]').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.view));
});

onUnreadChange(count => {
  document.getElementById('notif-dot').classList.toggle('hidden', count === 0);
});
fetchUnreadCount();

initGlobalSearch();
initAIPanel();
document.getElementById('ai-toggle-btn').addEventListener('click', toggleAIPanel);

// Notification panel
const notifBtn = document.getElementById('notif-btn');
let notifPanel = null;

notifBtn.addEventListener('click', async () => {
  if (notifPanel && !notifPanel.classList.contains('hidden')) {
    notifPanel.classList.add('hidden');
    return;
  }

  if (!notifPanel) {
    notifPanel = document.createElement('div');
    notifPanel.className = 'notif-panel hidden';
    notifPanel.innerHTML = `
      <div class="notif-panel-header">
        <span>Notifications</span>
        <button class="btn btn-ghost btn-sm" id="notif-mark-all">Mark all read</button>
      </div>
      <div class="notif-list" id="notif-list"></div>
    `;
    document.querySelector('.topbar-right').appendChild(notifPanel);

    document.getElementById('notif-mark-all').addEventListener('click', async () => {
      await markAllRead();
      loadNotifList();
    });

    document.addEventListener('click', (e) => {
      if (notifPanel && !e.target.closest('#notif-btn') && !e.target.closest('.notif-panel')) {
        notifPanel.classList.add('hidden');
      }
    });
  }

  await loadNotifList();
  notifPanel.classList.remove('hidden');
});

async function loadNotifList() {
  const notifs = await fetchNotifications(15);
  const listEl = document.getElementById('notif-list');
  if (!notifs.length) {
    listEl.innerHTML = `<div class="notif-empty">No notifications yet</div>`;
    return;
  }

  const moduleIcons = {
    leave: '\u{1F333}', attendance: '\u{1F551}', recruitment: '\u{1F4BC}', people: '\u{1F465}',
  };
  const moduleColors = {
    leave: 'var(--color-success-light)', attendance: 'var(--color-info-light)',
    recruitment: 'var(--color-warning-light)', people: 'var(--color-accent-light)',
  };

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
    );
  }

  function ago(d) {
    const s = Math.floor((Date.now() - new Date(d)) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
  }

  listEl.innerHTML = notifs.map(n => `
    <div class="notif-item ${n.status === 'unread' ? 'unread' : ''}" data-notif-id="${n.id}">
      <div class="notif-icon" style="background:${moduleColors[n.module] || 'var(--color-bg-tertiary)'}">${moduleIcons[n.module] || '\u{1F514}'}</div>
      <div class="notif-content">
        <div class="notif-title">${esc(n.title)}</div>
        ${n.body ? `<div class="notif-body">${esc(n.body)}</div>` : ''}
        <div class="notif-time">${ago(n.sent_at)}</div>
      </div>
    </div>
  `).join('');

  listEl.querySelectorAll('.notif-item.unread').forEach(item => {
    item.addEventListener('click', async () => {
      await markRead(item.dataset.notifId);
      item.classList.remove('unread');
    });
  });
}

registerRoute('dashboard', dashboard);
registerRoute('employees', employeeList);
registerRoute('attendance', attendanceDashboard);
registerRoute('leave', leaveApply);
registerRoute('recruitment', recruitmentJobs);
registerRoute('recruitment/jobs', recruitmentJobs);
registerRoute('recruitment/interviews', interviewsView);
registerRoute('settings', settingsOrg);
registerRoute('settings/users', settingsUsers);
registerRoute('settings/departments', departmentsView);
registerRoute('settings/integrations', integrationsView);
registerRoute('employees/profile', employeeProfile);
registerRoute('employees/import', employeeImport);
registerRoute('attendance/checkin', checkinView);
registerRoute('attendance/report', attendanceReport);
registerRoute('attendance/regularize', regularizeView);
registerRoute('leave/settings', leaveSettings);
registerRoute('recruitment/candidate', candidateProfile);
registerRoute('recruitment/shortlist', shortlistView);
registerRoute('recruitment/upload', uploadResumes);
registerRoute('recruitment/matcher', matcherView);
registerRoute('leave/calendar', leaveCalendar);
registerRoute('leave/balances', leaveBalances);
registerRoute('leave/approvals', leaveApprovals);
registerRoute('recruitment/job', jobDetail);
registerRoute('ai', aiAssistant);
registerRoute('audit', auditLog);

initRouter(document.getElementById('main-content'));

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
