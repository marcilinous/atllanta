<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atllanta — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/base.css">
<style>
  .login-page {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--color-bg-secondary);
    padding: var(--space-6);
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    padding: var(--space-10) var(--space-8);
    box-shadow: var(--shadow-lg);
  }

  .login-logo {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    background: var(--color-accent);
    color: var(--color-text-inverse);
    font-weight: 700;
    font-size: 22px;
    border-radius: var(--radius-lg);
    margin-bottom: var(--space-5);
  }

  .login-title {
    font-size: var(--text-2xl);
    font-weight: var(--font-weight-bold);
    margin-bottom: var(--space-1);
  }

  .login-subtitle {
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-8);
  }

  .login-form { display: flex; flex-direction: column; gap: var(--space-4); }

  .login-form label {
    display: block;
    font-size: var(--text-sm);
    font-weight: var(--font-weight-medium);
    color: var(--color-text-primary);
    margin-bottom: var(--space-1);
  }

  .login-form input {
    display: block;
    width: 100%;
    padding: var(--space-2) var(--space-3);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: var(--text-base);
    color: var(--color-text-primary);
    background: var(--color-bg);
    transition: border-color var(--transition-fast);
    height: 40px;
  }

  .login-form input:focus {
    outline: none;
    border-color: var(--color-accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .login-form input::placeholder { color: var(--color-text-tertiary); }

  .login-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 42px;
    background: var(--color-accent);
    color: var(--color-text-inverse);
    border: none;
    border-radius: var(--radius-md);
    font-size: var(--text-base);
    font-weight: var(--font-weight-semibold);
    cursor: pointer;
    transition: background var(--transition-fast);
    margin-top: var(--space-2);
  }

  .login-btn:hover { background: var(--color-accent-hover); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .login-divider {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    margin: var(--space-5) 0;
    font-size: var(--text-xs);
    color: var(--color-text-tertiary);
  }

  .login-divider::before,
  .login-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--color-border);
  }

  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    width: 100%;
    height: 42px;
    background: var(--color-bg);
    color: var(--color-text-primary);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: var(--text-sm);
    font-weight: var(--font-weight-medium);
    cursor: pointer;
    transition: background var(--transition-fast);
  }

  .google-btn:hover { background: var(--color-bg-secondary); }

  .google-btn svg { width: 18px; height: 18px; }

  .login-error {
    font-size: var(--text-sm);
    color: var(--color-error);
    background: var(--color-error-light);
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    margin-top: var(--space-2);
  }

  .login-footer {
    text-align: center;
    margin-top: var(--space-6);
    font-size: var(--text-sm);
    color: var(--color-text-tertiary);
  }

  .login-footer a { color: var(--color-accent); font-weight: var(--font-weight-medium); }

  .login-toggle {
    text-align: center;
    margin-top: var(--space-4);
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
  }

  .login-toggle button {
    color: var(--color-accent);
    font-weight: var(--font-weight-medium);
    background: none;
    border: none;
    cursor: pointer;
    font-size: var(--text-sm);
  }

  .login-toggle button:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">A</div>
    <h1 class="login-title">Welcome back</h1>
    <p class="login-subtitle">Sign in to your Atllanta workspace</p>

    <form id="login-form" class="login-form">
      <div>
        <label for="login-email">Email</label>
        <input type="email" id="login-email" autocomplete="email" required placeholder="you@company.com">
      </div>
      <div>
        <label for="login-password">Password</label>
        <input type="password" id="login-password" autocomplete="current-password" required placeholder="Enter your password">
      </div>
      <button type="submit" class="login-btn" id="login-btn">Sign in</button>
      <div id="login-error" class="login-error hidden"></div>
    </form>

    <div class="login-divider">or</div>

    <button type="button" class="google-btn" id="google-btn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div id="signup-section" class="hidden">
      <form id="signup-form" class="login-form" style="margin-top: var(--space-4)">
        <div>
          <label for="signup-name">Full name</label>
          <input type="text" id="signup-name" required placeholder="Your full name">
        </div>
        <div>
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" autocomplete="email" required placeholder="you@company.com">
        </div>
        <div>
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" autocomplete="new-password" required placeholder="Min 6 characters" minlength="6">
        </div>
        <button type="submit" class="login-btn" id="signup-btn">Create account</button>
        <div id="signup-error" class="login-error hidden"></div>
      </form>
    </div>

    <div class="login-toggle">
      <span id="toggle-text">Don't have an account?</span>
      <button id="toggle-btn">Sign up</button>
    </div>
  </div>
</div>

<script>
  const t = localStorage.getItem('atllanta-theme');
  if (t) document.documentElement.setAttribute('data-theme', t);
</script>
<script src="/js/config.js"></script>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const cfg = window.ATLLANTA_CONFIG;
const sb = createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

const { data: { session } } = await sb.auth.getSession();
if (session) { window.location.href = '/'; }

let mode = 'login';
const loginForm = document.getElementById('login-form');
const signupSection = document.getElementById('signup-section');
const signupForm = document.getElementById('signup-form');
const toggleBtn = document.getElementById('toggle-btn');
const toggleText = document.getElementById('toggle-text');

toggleBtn.addEventListener('click', () => {
  mode = mode === 'login' ? 'signup' : 'login';
  loginForm.classList.toggle('hidden', mode === 'signup');
  signupSection.classList.toggle('hidden', mode === 'login');
  document.querySelector('.login-title').textContent = mode === 'login' ? 'Welcome back' : 'Create your account';
  document.querySelector('.login-subtitle').textContent = mode === 'login' ? 'Sign in to your Atllanta workspace' : 'Get started with Atllanta';
  toggleText.textContent = mode === 'login' ? "Don't have an account?" : 'Already have an account?';
  toggleBtn.textContent = mode === 'login' ? 'Sign up' : 'Sign in';
});

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  const { error } = await sb.auth.signInWithPassword({
    email: document.getElementById('login-email').value.trim(),
    password: document.getElementById('login-password').value,
  });

  btn.disabled = false;
  btn.textContent = 'Sign in';

  if (error) {
    errEl.textContent = error.message;
    errEl.classList.remove('hidden');
    return;
  }
  window.location.href = '/';
});

signupForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('signup-btn');
  const errEl = document.getElementById('signup-error');
  errEl.classList.add('hidden');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  const { error } = await sb.auth.signUp({
    email: document.getElementById('signup-email').value.trim(),
    password: document.getElementById('signup-password').value,
    options: {
      data: { full_name: document.getElementById('signup-name').value.trim() }
    }
  });

  btn.disabled = false;
  btn.textContent = 'Create account';

  if (error) {
    errEl.textContent = error.message;
    errEl.classList.remove('hidden');
    return;
  }
  window.location.href = '/';
});

document.getElementById('google-btn').addEventListener('click', async () => {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/' }
  });
});
</script>
</body>
</html>
