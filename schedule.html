<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Interview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#131C2B;--ink2:#4A5578;--grey:#8B8FA3;--paper:#F7F6F2;--white:#FFFFFF;--amber:#E8890C;--teal:#0F766E;--green:#16a34a;--green2:#dcfce7;--brick:#B42318;--line:#E5E7EB;--line2:#F3F4F6;--font-display:'Bricolage Grotesque',sans-serif;--font-body:'Inter',sans-serif}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:480px}
.card{background:var(--white);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:32px 28px;margin-bottom:16px}
.logo{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--ink);margin-bottom:24px;text-align:center}
.logo span{color:var(--amber)}
.header{text-align:center;margin-bottom:28px}
.header h1{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:6px}
.header p{font-size:14px;color:var(--ink2);line-height:1.5}
.org-name{color:var(--amber);font-weight:600}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--grey);margin-bottom:12px}
.slots-group{margin-bottom:20px}
.slots-group .date-label{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--line2)}
.slot-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:12px 16px;margin-bottom:6px;border:1.5px solid var(--line);border-radius:12px;background:var(--white);font-family:var(--font-body);font-size:14px;color:var(--ink);cursor:pointer;transition:all .15s}
.slot-btn:hover{border-color:var(--teal);background:#f0fdfa}
.slot-btn.selected{border-color:var(--teal);background:#f0fdfa;box-shadow:0 0 0 2px rgba(15,118,110,.15)}
.slot-btn .time{font-weight:600}
.slot-btn .duration{font-size:12px;color:var(--grey)}
.confirm-wrap{margin-top:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:14px;font-family:var(--font-body);font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:#0d6660}
.btn-primary:disabled{background:var(--grey);cursor:not-allowed}
.success-card{text-align:center;padding:40px 28px}
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--green2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.success-icon svg{width:32px;height:32px;color:var(--green)}
.success-card h2{font-family:var(--font-display);font-size:20px;margin-bottom:8px}
.success-card p{font-size:14px;color:var(--ink2);line-height:1.5}
.success-detail{margin-top:20px;padding:16px;background:var(--line2);border-radius:12px;text-align:left}
.success-detail .row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.success-detail .row .label{color:var(--grey)}
.success-detail .row .value{font-weight:600;color:var(--ink)}
.empty-msg{text-align:center;padding:32px 20px;color:var(--grey);font-size:14px;line-height:1.6}
.loading{text-align:center;padding:60px 20px;color:var(--grey);font-size:14px}
.error-msg{text-align:center;padding:40px 20px;color:var(--brick);font-size:14px}
.expiry-bar{text-align:center;font-size:12.5px;color:var(--amber);background:#fef3c7;padding:8px 14px;border-radius:10px;margin-bottom:16px}
@media(max-width:480px){.card{padding:24px 20px;border-radius:12px}body{padding:12px}}
</style>
</head>
<body>
<div class="container">
  <div class="logo">atl<span>l</span>anta</div>
  <div class="card" id="main-card">
    <div class="loading" id="loading">Loading available slots…</div>
  </div>
</div>
<script>
const API = window.location.origin + "/api/schedule";
const token = new URLSearchParams(window.location.search).get("token");
const card = document.getElementById("main-card");
let selectedSlot = null;

function fmtDate(d) {
  return d.toLocaleDateString("en", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}
function fmtTime(d) {
  return d.toLocaleTimeString("en", { hour: "2-digit", minute: "2-digit", hour12: true });
}
function duration(start, end) {
  const mins = Math.round((end - start) / 60000);
  return mins >= 60 ? `${Math.floor(mins/60)}h ${mins%60 ? mins%60 + "m" : ""}`.trim() : `${mins}m`;
}
function esc(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

async function init() {
  if (!token) {
    card.innerHTML = `<div class="error-msg">Invalid scheduling link.</div>`;
    return;
  }

  try {
    const res = await fetch(`${API}?token=${token}`);
    const data = await res.json();
    if (res.status === 410) {
      card.innerHTML = `<div class="error-msg">
        <div style="font-size:32px;margin-bottom:12px">⏰</div>
        <strong>Link expired</strong><br>This scheduling link is no longer active.<br>Please ask the hiring team for a new link.</div>`;
      return;
    }
    if (!res.ok) { card.innerHTML = `<div class="error-msg">${esc(data.error)}</div>`; return; }

    if (data.booked) {
      showBooked(data);
      return;
    }

    if (!data.slots || !data.slots.length) {
      card.innerHTML = `
        <div class="header">
          <h1>${esc(data.job_title)}</h1>
          <p>${data.org_name ? `<span class="org-name">${esc(data.org_name)}</span> · ` : ""}Interview scheduling</p>
        </div>
        <div class="empty-msg">No available time slots right now.<br>The hiring team will share new slots soon.</div>`;
      return;
    }

    renderSlots(data);
  } catch (e) {
    card.innerHTML = `<div class="error-msg">Could not load scheduling data. Please try again.</div>`;
  }
}

function renderSlots(data) {
  const grouped = {};
  data.slots.forEach((s) => {
    const start = new Date(s.slot_start);
    const key = start.toDateString();
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(s);
  });

  let expiryHtml = "";
  if (data.expires_at) {
    const exp = new Date(data.expires_at);
    const remain = exp - Date.now();
    if (remain > 0) {
      const hrs = Math.floor(remain / 3600000);
      const mins = Math.floor((remain % 3600000) / 60000);
      expiryHtml = `<div class="expiry-bar">Link expires in <strong>${hrs}h ${mins}m</strong></div>`;
    }
  }

  let html = `
    <div class="header">
      <h1>${esc(data.job_title)}</h1>
      <p>Hi ${esc(data.candidate_name.split(" ")[0])}, ${data.org_name ? `<span class="org-name">${esc(data.org_name)}</span>` : "the team"} would like to interview you. Pick a time that works for you.</p>
    </div>
    ${expiryHtml}
    <div class="section-title">Available slots</div>`;

  for (const [dateKey, slots] of Object.entries(grouped)) {
    const d = new Date(dateKey);
    html += `<div class="slots-group">
      <div class="date-label">${fmtDate(d)}</div>`;
    slots.forEach((s) => {
      const start = new Date(s.slot_start);
      const end = new Date(s.slot_end);
      html += `<button class="slot-btn" data-id="${s.id}">
        <span class="time">${fmtTime(start)} – ${fmtTime(end)}</span>
        <span class="duration">${duration(start, end)}</span>
      </button>`;
    });
    html += `</div>`;
  }

  html += `<div class="confirm-wrap">
    <button class="btn btn-primary" id="confirm-btn" disabled>Select a time slot</button>
  </div>`;
  card.innerHTML = html;

  card.querySelectorAll(".slot-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      card.querySelectorAll(".slot-btn").forEach((b) => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedSlot = btn.dataset.id;
      const confirmBtn = document.getElementById("confirm-btn");
      confirmBtn.disabled = false;
      confirmBtn.textContent = "Confirm interview";
    });
  });

  document.getElementById("confirm-btn").addEventListener("click", book);
}

async function book() {
  if (!selectedSlot) return;
  const btn = document.getElementById("confirm-btn");
  btn.disabled = true;
  btn.textContent = "Booking…";

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, slot_id: selectedSlot }),
    });
    const data = await res.json();
    if (!res.ok) {
      btn.textContent = data.error || "Booking failed — try another slot";
      btn.disabled = false;
      return;
    }
    showBooked({ interview_at: data.interview_at });
  } catch (e) {
    btn.textContent = "Network error — please retry";
    btn.disabled = false;
  }
}

function showBooked(data) {
  const dt = new Date(data.interview_at);
  card.innerHTML = `<div class="success-card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h2>Interview confirmed!</h2>
    <p>You're all set. The hiring team will reach out with details.</p>
    <div class="success-detail">
      ${data.job_title ? `<div class="row"><span class="label">Position</span><span class="value">${esc(data.job_title)}</span></div>` : ""}
      ${data.org_name ? `<div class="row"><span class="label">Company</span><span class="value">${esc(data.org_name)}</span></div>` : ""}
      <div class="row"><span class="label">Date</span><span class="value">${fmtDate(dt)}</span></div>
      <div class="row"><span class="label">Time</span><span class="value">${fmtTime(dt)}</span></div>
    </div>
  </div>`;
}

init();
</script>
</body>
</html>
